<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="1024" fill="#F6F7F9"/>

  <style>
    .title { font: 700 28px Inter, Arial, sans-serif; fill: #111827; }
    .subtitle { font: 400 13px Inter, Arial, sans-serif; fill: #6B7280; }
    .section { font: 700 15px Inter, Arial, sans-serif; fill: #111827; }
    .label { font: 600 11px Inter, Arial, sans-serif; fill: #6B7280; letter-spacing: .04em; }
    .body { font: 500 13px Inter, Arial, sans-serif; fill: #374151; }
    .body2 { font: 400 12px Inter, Arial, sans-serif; fill: #6B7280; }
    .num { font: 700 30px Inter, Arial, sans-serif; fill: #111827; }
    .smallnum { font: 700 18px Inter, Arial, sans-serif; fill: #111827; }
    .nav { font: 600 13px Inter, Arial, sans-serif; fill: #4B5563; }
    .chip { font: 700 11px Inter, Arial, sans-serif; }
    .mono { font: 600 12px "JetBrains Mono", Consolas, monospace; fill: #4B5563; }
  </style>

  <!-- Sidebar -->
  <rect x="0" y="0" width="244" height="1024" fill="#FFFFFF"/>
  <rect x="243" y="0" width="1" height="1024" fill="#E5E7EB"/>
  <circle cx="40" cy="34" r="16" fill="#111827"/>
  <text x="66" y="30" class="section">PMP Cockpit</text>
  <text x="66" y="48" class="body2">Delivery &amp; Finanzas</text>

  <rect x="20" y="92" width="204" height="38" rx="7" fill="#111827"/>
  <text x="52" y="116" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Cockpit Ejecutivo</text>
  <text x="52" y="162" class="nav">Iniciativas</text>
  <text x="52" y="202" class="nav">Proyectos</text>
  <text x="52" y="242" class="nav">Entregables</text>
  <text x="52" y="282" class="nav">Riesgos</text>
  <text x="52" y="322" class="nav">Clientes</text>
  <text x="52" y="362" class="nav">Roadmap</text>
  <text x="52" y="402" class="nav">Finanzas</text>

  <rect x="20" y="850" width="204" height="112" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="36" y="878" class="label">VISTA ACTUAL</text>
  <text x="36" y="903" class="body">CEO / COO</text>
  <text x="36" y="925" class="body2">Resumen ejecutivo listo</text>
  <text x="36" y="943" class="body2">para imprimir o enviar.</text>

  <!-- Header -->
  <rect x="244" y="0" width="1196" height="72" fill="#FFFFFF"/>
  <rect x="244" y="71" width="1196" height="1" fill="#E5E7EB"/>
  <text x="276" y="34" class="title">Cockpit Ejecutivo</text>
  <text x="276" y="55" class="subtitle">Salud del portafolio, decisiones recomendadas e impacto de negocio</text>
  <rect x="1018" y="20" width="94" height="32" rx="6" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="1040" y="41" class="body">Imprimir</text>
  <rect x="1124" y="20" width="126" height="32" rx="6" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="1146" y="41" class="body">Exportar PDF</text>
  <rect x="1262" y="20" width="134" height="32" rx="6" fill="#111827"/>
  <text x="1283" y="41" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Enviar reporte</text>

  <!-- Main content -->
  <text x="276" y="104" class="label">RESUMEN EJECUTIVO · 24 JUN 2026</text>

  <!-- KPI cards -->
  <g>
    <rect x="276" y="124" width="208" height="118" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="296" y="153" class="label">CLIENTES ACTIVOS</text>
    <text x="296" y="194" class="num">2</text>
    <text x="296" y="220" class="body2">1 cliente con presión alta</text>
  </g>
  <g>
    <rect x="500" y="124" width="208" height="118" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="520" y="153" class="label">PROYECTOS CRÍTICOS</text>
    <text x="520" y="194" class="num">2</text>
    <circle cx="656" cy="183" r="6" fill="#DC2626"/>
    <circle cx="674" cy="183" r="6" fill="#D97706"/>
    <text x="520" y="220" class="body2">1 rojo · 1 ámbar</text>
  </g>
  <g>
    <rect x="724" y="124" width="208" height="118" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
