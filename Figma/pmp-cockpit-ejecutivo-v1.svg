  <rect x="296" y="818" width="1080" height="38" fill="#F9FAFB"/>
  <text x="316" y="842" class="label">CLIENTE</text>
  <text x="492" y="842" class="label">INICIATIVA</text>
  <text x="728" y="842" class="label">ESTADO</text>
  <text x="846" y="842" class="label">RIESGO</text>
  <text x="968" y="842" class="label">ENTREGABLE CLAVE</text>
  <text x="1204" y="842" class="label">ACCIÓN</text>

  <line x1="296" y1="856" x2="1376" y2="856" stroke="#E5E7EB"/>
  <text x="316" y="890" class="body">Ministerio de Justicia</text>
  <text x="492" y="890" class="body">LUD Legajo Único Digital</text>
  <rect x="728" y="872" width="70" height="24" rx="12" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="746" y="888" class="chip" fill="#92400E">ÁMBAR</text>
  <text x="846" y="890" class="body">Score 6</text>
  <text x="968" y="890" class="body">Conformidad pendiente</text>
  <text x="1204" y="890" class="body">Comité ejecutivo</text>

  <line x1="296" y1="906" x2="1376" y2="906" stroke="#E5E7EB"/>
  <text x="316" y="940" class="body">Ministerio de Justicia</text>
  <text x="492" y="940" class="body">Assessment 2</text>
  <rect x="728" y="922" width="70" height="24" rx="12" fill="#FEF2F2" stroke="#FECACA"/>
  <text x="748" y="938" class="chip" fill="#991B1B">ROJO</text>
  <text x="846" y="940" class="body">Score 9</text>
  <text x="968" y="940" class="body">Mail Exchange Mediaciones</text>
