    <text x="968" y="194" class="num">2</text>
    <text x="968" y="220" class="body2">Score mayor o igual a 6</text>
  </g>
  <g>
    <rect x="1172" y="124" width="224" height="118" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1192" y="153" class="label">IMPACTO FINANCIERO</text>
    <text x="1192" y="194" class="num">$ ?</text>
