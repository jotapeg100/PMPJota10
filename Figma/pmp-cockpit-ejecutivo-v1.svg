  <text x="296" y="318" class="body2">Acciones ejecutivas para destrabar delivery, caja o relación con cliente.</text>

  <rect x="296" y="342" width="624" height="42" rx="6" fill="#FEF2F2" stroke="#FECACA"/>
  <rect x="296" y="342" width="5" height="42" rx="2" fill="#DC2626"/>
  <text x="318" y="367" class="body">Definir plan de recuperación para Mail Exchange Mediaciones</text>
  <text x="772" y="367" class="chip" fill="#B91C1C">ALTA</text>

  <rect x="296" y="398" width="624" height="42" rx="6" fill="#FFFBEB" stroke="#FDE68A"/>
  <rect x="296" y="398" width="5" height="42" rx="2" fill="#D97706"/>
  <text x="318" y="423" class="body">Priorizar conformidad de entregables vencidos para cerrar facturación</text>
  <text x="768" y="423" class="chip" fill="#B45309">MEDIA</text>

  <rect x="296" y="454" width="624" height="28" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="318" y="473" class="body2">Alinear alcance LUD con próximas fechas comprometidas del cliente</text>

  <!-- Timeline -->
  <rect x="956" y="266" width="440" height="232" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="976" y="296" class="section">Próximos 30 días</text>
  <text x="976" y="318" class="body2">Vencimientos, hitos y puntos de control ejecutivo.</text>
  <line x1="998" y1="350" x2="998" y2="472" stroke="#D1D5DB" stroke-width="2"/>
  <circle cx="998" cy="356" r="6" fill="#DC2626"/>
  <text x="1020" y="361" class="body">5 entregables vencidos sin conformidad</text>
  <circle cx="998" cy="398" r="6" fill="#D97706"/>
  <text x="1020" y="403" class="body">15 entregables próximos</text>
  <circle cx="998" cy="440" r="6" fill="#16A34A"/>
  <text x="1020" y="445" class="body">4 entregables conformados</text>
  <rect x="1222" y="340" width="144" height="34" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="1242" y="362" class="body2">Ver calendario</text>

  <!-- Client health matrix -->
  <rect x="276" y="522" width="720" height="222" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="296" y="552" class="section">Salud por cliente</text>
  <text x="296" y="574" class="body2">Lectura cruzada entre delivery, presión ejecutiva y señal financiera.</text>

  <rect x="296" y="596" width="680" height="40" fill="#F9FAFB"/>
  <text x="316" y="621" class="label">CLIENTE</text>
  <text x="482" y="621" class="label">DELIVERY</text>
  <text x="610" y="621" class="label">FINANZAS</text>
  <text x="742" y="621" class="label">ACCIÓN EJECUTIVA</text>

  <line x1="296" y1="636" x2="976" y2="636" stroke="#E5E7EB"/>
  <text x="316" y="669" class="body">Ministerio de Justicia</text>
  <rect x="482" y="649" width="70" height="24" rx="12" fill="#FFFBEB" stroke="#FDE68A"/>
  <circle cx="500" cy="661" r="5" fill="#D97706"/>
  <text x="514" y="665" class="chip" fill="#92400E">ÁMBAR</text>
  <text x="610" y="665" class="body2">Cierre condicionado</text>
  <text x="742" y="665" class="body">Comité de alcance y vencidos</text>

  <line x1="296" y1="688" x2="976" y2="688" stroke="#E5E7EB"/>
  <text x="316" y="721" class="body">Coppel</text>
  <rect x="482" y="701" width="70" height="24" rx="12" fill="#F0FDF4" stroke="#BBF7D0"/>
  <circle cx="500" cy="713" r="5" fill="#16A34A"/>
  <text x="514" y="717" class="chip" fill="#166534">VERDE</text>
  <text x="610" y="717" class="body2">Sin bloqueo visible</text>
  <text x="742" y="717" class="body">Mantener seguimiento mensual</text>

  <!-- Right insight panel -->
  <rect x="1012" y="522" width="384" height="222" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="1032" y="552" class="section">Lectura ejecutiva</text>
  <text x="1032" y="581" class="body">El foco de decisión está en convertir entregables entregados en conformidad, reducir vencidos y proteger hitos del Ministerio de Justicia.</text>
  <rect x="1032" y="612" width="344" height="1" fill="#E5E7EB"/>
  <text x="1032" y="642" class="label">MENSAJE PARA CEO / COO</text>
  <text x="1032" y="668" class="body2">No se requiere microgestión técnica.</text>
  <text x="1032" y="690" class="body2">Se requiere decisión de negocio:</text>
  <text x="1032" y="712" class="body2">prioridad, alcance, conformidad y caja.</text>

