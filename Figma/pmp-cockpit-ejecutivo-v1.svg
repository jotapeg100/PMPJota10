    <text x="744" y="194" class="num">15</text>
    <text x="744" y="220" class="body2">5 vencidos sin conformidad</text>
  </g>
  <g>
    <rect x="948" y="124" width="208" height="118" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
